server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Reverse proxy para Gemini API (evita problemas de CORS/fetch no Safari)
    location /api/gemini/ {
        proxy_pass https://generativelanguage.googleapis.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header Accept "application/json";
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # Remover headers desnecessários do browser
        proxy_set_header Origin "";
        proxy_set_header Referer "";

        # Timeouts para chamadas de API
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # Permitir POST com body grande (para PDFs em base64)
        client_max_body_size 20m;
    }

    # SPA: todas as rotas vão para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
